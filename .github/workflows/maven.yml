name: Build Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Sonar packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar

    - name: Run SonarQube scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        output=$(mvn clean verify sonar:sonar \
          -Dsonar.projectKey=healthcheck-service \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }})
    
        ceTaskId=$(echo "$output" | grep -oP 'ceTaskId=\K[^ ]+')
        echo "ceTaskId=$ceTaskId"
        echo "ceTaskId=$ceTaskId" >> $GITHUB_OUTPUT

          
    - name: Wait for Quality Gate
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        echo "Checking Quality Gate result..."
        for i in {1..10}; do
          sleep 10
          STATUS=$(curl -s -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/ce/task?id=${{ steps.scan.outputs.ceTaskId }}" | jq -r '.task.status')
          if [ "$STATUS" == "SUCCESS" ]; then
            break
          elif [ "$STATUS" == "FAILED" ]; then
            echo "SonarQube analysis failed."
            exit 1
          fi
        done
    
        QG_STATUS=$(curl -s -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=BoardGame" | jq -r '.projectStatus.status')
        echo "Quality Gate status: $QG_STATUS"
        if [ "$QG_STATUS" != "OK" ]; then
          echo "Quality Gate failed."
          exit 1
        fi
          
    - name: Build Docker image
      run: docker build -t healthcheck-service .
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y apt-transport-https curl gnupg lsb-release
        curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy
        
    - name: Scan the Docker image with Trivy
      run: |
        trivy image --format json --output trivy-report.json healthcheck-service:latest
        
    - name: Upload Trivy scan results
      uses: actions/upload-artifact@v4
      with:
        name: trivy-report
        path: trivy-report.json
        
    - name: Install Docker Credential Helper
      run: |
        sudo apt-get install amazon-ecr-credential-helper
        mkdir -p ~/.docker
        echo '{"credsStore": "ecr-login"}' > ~/.docker/config.json

    - name: Tag Docker image for ECR
      run: |
        docker tag healthcheck-service:latest 088351136602.dkr.ecr.us-east-1.amazonaws.com/healthcheck-service:latest

    - name: Push Docker image to AWS ECR
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: |
        docker push 088351136602.dkr.ecr.us-east-1.amazonaws.com/healthcheck-service:latest
